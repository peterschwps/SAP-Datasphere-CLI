# ----- Project Info -----

[project]
name = "sap-datasphere-automation"
version = "0.1.1"
description = "SAP Datasphere Automation"
authors = [
    { name = "Peter Schwips" }
]
readme = "README.md"
requires-python = ">=3.12,<3.14"
dependencies = [
    "beautifulsoup4>=4.13.4,<5.0.0",
    "python-dateutil>=2.9.0.post0,<3.0.0",
    "rich>=14.0.0,<15.0.0",
    "playwright>=1.54.0,<2.0.0",
    "pandas>=2.3.1,<3.0.0",
    "platformdirs>=4.4.0",
    "httpx>=0.28.1",
    "textual>=8.2.7",
    "textual-dev>=1.8.0",
]

# ----- Tools -----

[tool.ruff]
line-length = 79

[tool.ruff.lint]
select = [
    "E",  # pycodestyle
    "F",  # Pyflakes
    "UP",  # pyupgrade
    "B",  # flake8-bugbear
    "SIM",  # flake8-simplify
    "G",  # flake8-logging-format
    "I",  # isort
]

[tool.pyright]
typeCheckingMode = "basic"

[dependency-groups]
dev = [
    "pyright>=1.1.405",
    "ruff>=0.13.0",
]

