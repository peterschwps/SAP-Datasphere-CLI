name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      # Installs CLI and Core packages from the workspace, resolves
      # the datasphere-api from PyPI and ignores the local path in the
      # pyproject.toml
      - run: >
          uv sync --all-packages --no-dev
          --no-sources-package datasphere-api
      - run: >
          uv run --no-sources-package datasphere-api
          --with ruff ruff check .

  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python-version }}
      - run: >
          uv sync --all-packages
          --no-sources-package datasphere-api
          --python ${{ matrix.python-version }}
      - run: >
          uv run --no-sources-package datasphere-api pytest

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv build --all-packages

  commitlint:
    name: Commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

  branch-name:
    name: Branch name
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate branch name
        run: |
          name="${{ github.head_ref }}"
          # Exempt automation branches whose names follow each tool's own
          # convention (Dependabot, release-please).
          if [[ "$name" == dependabot/* ]] \
             || [[ "$name" == release-please--* ]]; then
            echo "::notice::Skipping branch-name check for bot branch '$name'"
            exit 0
          fi
          pattern='^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)/[a-z0-9._-]+$'
          if ! echo "$name" | grep -Eq "$pattern"; then
            echo "::error::Branch '$name' must match: $pattern"
            exit 1
          fi
