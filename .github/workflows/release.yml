name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/Datasphere-CLI
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  github-release:
    name: Upload distributions to GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*

  binaries:
    name: Build ${{ matrix.platform }} binary
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      # --no-sources ignores the local path link to ../SAP-Datasphere-API
      # and installs datasphere-api from PyPI instead
      - name: Install project dependencies
        run: uv sync --no-sources

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build executable (Windows)
        if: matrix.platform == 'windows'
        run: >
          uv run --no-sources pyinstaller --onefile main.py
          --name DatasphereAutomation
          --icon sap_datasphere_automation/static/datasphere.ico

      - name: Build executable (macOS)
        if: matrix.platform == 'macos'
        run: >
          uv run --no-sources pyinstaller --onefile main.py
          --name DatasphereAutomation

      - name: Package artifact with version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist_out
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp "dist/DatasphereAutomation.exe" \
              "dist_out/DatasphereAutomation-${VERSION}-windows.exe"
          else
            cp "dist/DatasphereAutomation" \
              "dist_out/DatasphereAutomation-${VERSION}-macos"
          fi

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist_out/*
