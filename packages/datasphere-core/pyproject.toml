[project]
name = "Datasphere-Core"
version = "0.4.0"
description = "Shared application commands for SAP Datasphere automation"
authors = [
    { name = "Peter Schwips" }
]
readme = "README.md"
license = { file = "LICENSE.txt" }
requires-python = ">=3.12"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
    "Typing :: Typed",
]
dependencies = [
    "datasphere-api>=0.2.0",
    "filelock>=3.20.0",
    "keyring>=25.6.0",
    "platformdirs>=4.4.0",
]

[project.urls]
Homepage = "https://github.com/peterschwps/SAP-Datasphere-CLI"
Repository = "https://github.com/peterschwps/SAP-Datasphere-CLI"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/datasphere_core"]
